name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate skills and links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository structure and skills
        run: python3 scripts/validate-repo.py

      - name: Verify setup.init non-interactively
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          # Place agent-skills as a sibling under tmp/work so workspace root sits above it.
          # Make the workspace root itself a git repo so the .gitignore branch is exercised.
          mkdir -p "$tmp/work"
          (cd "$tmp/work" && git init -q)
          cp -R . "$tmp/work/agent-skills"
          # Provide a sibling repo so PROJECTS_JSON detection has something to find.
          mkdir -p "$tmp/work/example-py/.git"
          printf '[project]\nname = "example-py"\n' > "$tmp/work/example-py/pyproject.toml"
          (cd "$tmp/work/agent-skills" && ./setup.init --yes --no-jira --workspace-root "$tmp/work")
          (cd "$tmp/work/agent-skills" && ./setup.init --verify --workspace-root "$tmp/work")
          test -f "$tmp/work/.env"
          test -L "$tmp/work/.skills"
          test -f "$tmp/work/.gitignore"
          grep -q ">>> agent-skills setup.init" "$tmp/work/.env"
          grep -q ">>> agent-skills setup.init" "$tmp/work/.gitignore"
          # Idempotency: rerun must not duplicate the gitignore block.
          (cd "$tmp/work/agent-skills" && ./setup.init --yes --no-jira --workspace-root "$tmp/work")
          test "$(grep -c '>>> agent-skills setup.init' "$tmp/work/.gitignore")" = "1"
          # Safety: must refuse unsafe roots like $HOME.
          if (cd "$tmp/work/agent-skills" && ./setup.init --yes --no-jira --workspace-root "$HOME"); then
            echo "ERROR: setup.init accepted \$HOME as workspace root" >&2
            exit 1
          fi

      - name: Markdown link check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/markdown-link-check.json"
