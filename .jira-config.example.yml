# Jira CLI configuration template.
#
# This file is OPTIONAL — the `jira` CLI also reads JIRA_HOST, JIRA_LOGIN,
# JIRA_AUTH_TYPE and JIRA_API_TOKEN directly from environment variables.
# Keep this file only if you want a project- or workspace-specific default
# project, board, or epic preselected for the CLI.
#
# Prefer running `./setup.init` and choosing Jira setup. It copies this file to
# `.jira-config.yml` in your workspace root. You can still copy it manually when
# you want full control. The real `.jira-config.yml` is gitignored.
#
# If a Jira ticket is in scope and neither this file nor the Jira environment
# variables are usable, skills must warn and stop instead of guessing from an
# unread ticket. If your Jira CLI does not expand ${VAR_NAME} values in YAML,
# either replace them here or rely on the environment variables from `.env`.

installation: cloud # cloud | local
server: ${JIRA_HOST}
login: ${JIRA_LOGIN}
auth_type: ${JIRA_AUTH_TYPE} # bearer | basic
project:
  key: ENG # Default project key (override per command with -p)
  type: software
board:
  id: 0 # Optional: default board id
  name: "" # Optional: default board name
epic:
  name: customfield_10100 # Adjust if your Jira instance uses a different field id
  link: customfield_10101
issue:
  fields:
    custom: [] # Add any custom fields you want pulled by default
